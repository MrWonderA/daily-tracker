<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f0eb">
  <title>日常打卡 · 个人管理工作台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
</head>
<body>
  <!-- 顶部状态栏 -->
  <header id="app-header">
    <div class="header-left">
      <button id="menu-toggle" class="icon-btn" aria-label="菜单">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="app-title" id="page-title">仪表盘</h1>
    </div>
    <div class="header-right">
      <span class="header-date" id="header-date"></span>
      <button id="theme-toggle" class="icon-btn" aria-label="切换主题">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- 侧边导航（桌面端） -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">📋</span>
      <span class="sidebar-brand">日常打卡</span>
    </div>
    <ul class="nav-list">
      <li><a href="#/dashboard" class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span class="nav-label">仪表盘</span></a></li>
      <li><a href="#/diary" class="nav-item" data-page="diary"><span class="nav-icon">📝</span><span class="nav-label">日记</span></a></li>
      <li><a href="#/study" class="nav-item" data-page="study"><span class="nav-icon">📚</span><span class="nav-label">学习</span></a></li>
      <li><a href="#/finance" class="nav-item" data-page="finance"><span class="nav-icon">💰</span><span class="nav-label">记账</span></a></li>
      <li><a href="#/habits" class="nav-item" data-page="habits"><span class="nav-icon">✅</span><span class="nav-label">习惯</span></a></li>
      <li><a href="#/tools" class="nav-item" data-page="tools"><span class="nav-icon">🧰</span><span class="nav-label">工具</span></a></li>
      <li><a href="#/settings" class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span class="nav-label">设置</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <span class="version">v1.0 · 纯本地</span>
    </div>
  </nav>

  <!-- 侧边遮罩 -->
  <div id="sidebar-overlay"></div>

  <!-- 主内容区域 -->
  <main id="main-content">
    <div id="page-container"></div>
  </main>

  <!-- 底部导航（移动端） -->
  <nav id="bottom-nav">
    <a href="#/dashboard" class="bottom-nav-item active" data-page="dashboard">
      <span class="bottom-nav-icon">📊</span>
      <span class="bottom-nav-label">首页</span>
    </a>
    <a href="#/diary" class="bottom-nav-item" data-page="diary">
      <span class="bottom-nav-icon">📝</span>
      <span class="bottom-nav-label">日记</span>
    </a>
    <a href="#/study" class="bottom-nav-item" data-page="study">
      <span class="bottom-nav-icon">📚</span>
      <span class="bottom-nav-label">学习</span>
    </a>
    <a href="#/finance" class="bottom-nav-item" data-page="finance">
      <span class="bottom-nav-icon">💰</span>
      <span class="bottom-nav-label">记账</span>
    </a>
    <a href="#/habits" class="bottom-nav-item" data-page="habits">
      <span class="bottom-nav-icon">✅</span>
      <span class="bottom-nav-label">习惯</span>
    </a>
    <a href="#/tools" class="bottom-nav-item" data-page="tools">
      <span class="bottom-nav-icon">🧰</span>
      <span class="bottom-nav-label">工具</span>
    </a>
  </nav>

  <!-- 确认对话框 -->
  <div id="confirm-dialog" class="dialog-overlay hidden">
    <div class="dialog-box">
      <p class="dialog-msg" id="confirm-msg">确定执行此操作？</p>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="confirm-cancel">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/modules/storage.js"></script>
  <script src="js/modules/utils.js"></script>
  <script src="js/modules/diary.js"></script>
  <script src="js/modules/study.js"></script>
  <script src="js/modules/finance.js"></script>
  <script src="js/modules/habits.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/extras.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
